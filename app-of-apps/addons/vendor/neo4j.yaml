---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-neo4j
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: 'neo4j-addon-chart-{{ .name }}'
      labels:
        argocd.argoproj.io/type: helm
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: addons
      sources:
        - chart: neo4j
          targetRevision: 2026.05.0
          repoURL: https://helm.neo4j.com/neo4j
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/app-of-apps/addons/vendor/neo4j/neo4j/values.yaml'
              - '$values/app-of-apps/addons/vendor/neo4j/neo4j/{{ index .metadata.labels "kubernetes.io/environment" }}.values.yaml'
        # - chart: neo4j-admin
        #   targetRevision: 2026.05.0
        #   repoURL: https://helm.neo4j.com/neo4j
        #   helm:
        #     ignoreMissingValueFiles: true
        #     valueFiles:
        #       - '$values/app-of-apps/addons/vendor/neo4j/neo4j-admin/values.yaml'
        #       - '$values/app-of-apps/addons/vendor/neo4j/neo4j-admin/{{ index .metadata.labels "kubernetes.io/environment" }}.values.yaml'
        #     valuesObject: {}
        - repoURL: https://github.com/dudo-home-lab/argo-config
          targetRevision: HEAD
          ref: values
      destination:
        name: '{{ .name }}'
        namespace: neo4j
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels: {}
          annotations: {}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
