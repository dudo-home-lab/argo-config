---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-otel
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: 'otel-addon-chart-{{ .name }}'
      labels:
        argocd.argoproj.io/type: helm
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: addons
      sources:
        - chart: opentelemetry-operator
          targetRevision: 0.120.0
          repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/app-of-apps/addons/vendor/otel/operator/values.yaml'
              - '$values/app-of-apps/addons/vendor/otel/operator/{{ index .metadata.labels "kubernetes.io/environment" }}.values.yaml'
            valuesObject: {}
        # - chart: opentelemetry-ebpf-instrumentation
        #   targetRevision: 0.10.0
        #   repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
        #   helm:
        #     ignoreMissingValueFiles: true
        #     valueFiles:
        #       - '$values/app-of-apps/addons/vendor/otel/ebpf-instrumentation/values.yaml'
        #       - '$values/app-of-apps/addons/vendor/otel/ebpf-instrumentation/{{ index .metadata.labels "kubernetes.io/environment" }}.values.yaml'
        #     valuesObject:
        #       config:
        #         create: true
        #         data:
        #           cluster_name: '{{ .name }}'
        - repoURL: https://github.com/dudo-home-lab/argo-config
          targetRevision: HEAD
          ref: values
      destination:
        name: '{{ .name }}'
        namespace: opentelemetry-operator-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels: {}
          annotations: {}
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
