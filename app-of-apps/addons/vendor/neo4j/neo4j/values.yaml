# https://github.com/neo4j/helm-charts/blob/dev/neo4j/values.yaml
---
neo4j:
  edition: community
  name: orbservability
  resources:
    cpu: 1
    memory: 4Gi
  config:
    server.http.enabled: "true"
    server.default.advertised_address: "neo4j.dudo.dev"
    server.http.advertised_address: "neo4j.dudo.dev:443"
    server.bolt.advertised_address: "neo4j.dudo.dev:443"
    dbms.usage_report.enabled: "false"
    dbms.security.allow_proxies: "istio-ingress"
    dbms.security.allow_hosts: "neo4j.dudo.dev"
volumes:
  data:
    mode: defaultStorageClass
    defaultStorageClass:
      requests:
        storage: 2Gi
services:
  neo4j:
    enabled: false
